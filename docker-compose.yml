
services:

  # ─── INFRASTRUCTURE ───────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: banking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SERVICES ─────────────────────────────────────────────────

  auth-service:
    build:
      context: ./Auth Service/auth-service
      dockerfile: Dockerfile
    container_name: banking-auth
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banking-network
    restart: on-failure

  account-service:
    build:
      context: ./Account Service/account-service
      dockerfile: Dockerfile
    container_name: banking-account
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/account_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - banking-network
    restart: on-failure

  transaction-service:
    build:
      context: ./Transaction Service/transaction-service
      dockerfile: Dockerfile
    container_name: banking-transaction
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/transaction_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      ACCOUNT_SERVICE_URL: http://banking-account:8082
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      account-service:
        condition: service_started
    networks:
      - banking-network
    restart: on-failure

  payment-service:
    build:
      context: ./Payment Service/payment-services
      dockerfile: Dockerfile
    container_name: banking-payment
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/payment_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      ACCOUNT_SERVICE_URL: http://banking-account:8082
      TRANSACTION_SERVICE_URL: http://banking-transaction:8083
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
    networks:
      - banking-network
    restart: on-failure

  notification-service:
    build:
      context: ./Notification Service/notification-service
      dockerfile: Dockerfile
    container_name: banking-notification
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/notification_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banking-network
    restart: on-failure

  api-gateway:
    build:
      context: ./API Gateway/api-gateway
      dockerfile: Dockerfile
    container_name: banking-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - account-service
      - transaction-service
      - payment-service
      - notification-service
    networks:
      - banking-network
    restart: on-failure

# ─── VOLUMES ────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:

# ─── NETWORKS ───────────────────────────────────────────────────

networks:
  banking-network:
    driver: bridge